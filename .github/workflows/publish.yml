name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Para publicar em GitHub Packages (privado/free):
          # registry-url: 'https://npm.pkg.github.com'
          # Para publicar em npm publico:
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Test + build
        run: |
          npm run test
          npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Para GitHub Packages, trocar para:
          # NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
