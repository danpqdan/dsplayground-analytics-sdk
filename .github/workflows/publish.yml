name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # GitHub Packages — token automatico via permissions: packages: write.
          registry-url: 'https://npm.pkg.github.com'
          scope: '@danpqdan'

      - name: Install
        run: npm ci

      - name: Test + build
        run: |
          npm run test
          npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
